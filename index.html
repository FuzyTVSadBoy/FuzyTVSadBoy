<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#030305">
<title>Nguyễn Thiện Vĩ | Cyberpunk Modder</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Russo+One&family=Righteous&family=Fira+Code:wght@400;700&family=Baloo+2:wght@700;800&family=Itim&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{
  --bg:  #030305;
  --c:   #00f0ff;
  --p:   #b026ff;
  --k:   #ff007f;
  --y:   #f7931a;
  --g:   #00ff41;
  --ease: cubic-bezier(0.25,0.46,0.45,0.94);
  --spring: cubic-bezier(0.34,1.56,0.64,1);
}
*{box-sizing:border-box;user-select:none;}
body{
  margin:0;padding:0;
  background:radial-gradient(ellipse at top center,#0f0420 0%,var(--bg) 65%);
  color:#fff;font-family:'Fira Code',monospace;
  overflow-x:hidden;display:flex;flex-direction:column;align-items:center;
  min-height:100vh;cursor:crosshair;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
}
#particles-js{position:fixed;inset:0;z-index:0;pointer-events:none;}
.cursor-glow{position:fixed;width:56px;height:56px;background:radial-gradient(circle,rgba(0,240,255,0.35) 0%,transparent 72%);border-radius:50%;pointer-events:none;transform:translate(-50%,-50%);z-index:9999;mix-blend-mode:screen;transition:transform 0.06s linear;}
.container{position:relative;z-index:1;width:min(92%,1050px);margin-top:6vh;padding-bottom:90px;}

.cr{position:fixed;border-radius:50%;border:1.5px solid;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);animation:cr-out 0.7s var(--ease) forwards;}
@keyframes cr-out{0%{width:0;height:0;opacity:.9;}100%{width:120px;height:120px;opacity:0;}}
.cs{position:fixed;pointer-events:none;z-index:9997;transform:translate(-50%,-50%);}
.cs span{position:absolute;border-radius:50%;}

.rev{opacity:0;transform:translateY(32px);animation:rev-up 0.8s var(--ease) forwards;will-change:transform,opacity;}
@keyframes rev-up{to{opacity:1;transform:translateY(0);}}

.header{text-align:center;margin-bottom:50px;}
.title-row{display:flex;align-items:center;justify-content:center;gap:14px;}
.title{font-family:'Baloo 2','Itim',cursive;font-size:clamp(38px,6.5vw,68px);font-weight:800;margin:0;letter-spacing:2px;display:inline-block;}
.title .char{display:inline-block;opacity:0;color:transparent;-webkit-text-stroke:2px var(--c);animation:char-draw 0.8s var(--spring) forwards;background:linear-gradient(135deg,var(--c) 0%,var(--p) 50%,var(--k) 100%);-webkit-background-clip:text;}
@keyframes char-draw{0%{opacity:0;transform:translateY(22px) scaleX(0.7);-webkit-text-stroke:2.5px var(--c);filter:drop-shadow(0 0 20px var(--c)) brightness(2.5);letter-spacing:-4px;}30%{opacity:1;transform:translateY(-5px) scaleX(1.04);letter-spacing:2px;}60%{transform:translateY(1px) scaleX(0.99);}80%{transform:translateY(-1px);}100%{opacity:1;transform:translateY(0) scaleX(1);-webkit-text-stroke:0;-webkit-text-fill-color:transparent;-webkit-background-clip:text;background-clip:text;filter:drop-shadow(0 0 5px rgba(176,38,255,0.4));letter-spacing:2px;}}
.title.done{background:linear-gradient(90deg,var(--c),var(--p),var(--k),var(--c));background-size:300% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:tshim 4s linear infinite;filter:drop-shadow(0 0 8px rgba(176,38,255,0.35));}
.title.done .char{animation:none;opacity:1;-webkit-text-stroke:0;}
@keyframes tshim{0%{background-position:0% 50%;}100%{background-position:300% 50%;}}
.title-row{animation:float-idle 5s ease-in-out infinite;animation-delay:2.5s;}
@keyframes float-idle{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}

.avatar-wrap{width:62px;height:62px;position:relative;flex-shrink:0;margin-top:-15px;transform-origin:bottom center;animation:avatar-peek 8s ease-in-out infinite;animation-delay:3s;opacity:0;animation-fill-mode:forwards;}
.avatar-img-node{width:100%;height:100%;display:block;object-fit:cover;object-position:center 15%;border-radius:50%;position:relative;z-index:2;}
.avatar-border{position:absolute;inset:0;border-radius:50%;border:2px solid rgba(0,240,255,0.9);box-shadow:0 0 12px rgba(0,240,255,0.6),0 0 25px rgba(176,38,255,0.4);z-index:3;pointer-events:none;animation:avatar-glow 3s ease-in-out infinite;}
@keyframes avatar-glow{0%,100%{box-shadow:0 0 12px rgba(0,240,255,0.6),0 0 25px rgba(176,38,255,0.4);}50%{box-shadow:0 0 20px rgba(0,240,255,0.9),0 0 38px rgba(176,38,255,0.7),0 0 55px rgba(255,0,127,0.25);}}
@keyframes avatar-peek{0%,5%{transform:translateY(-120%) rotate(-12deg);opacity:0;}15%,45%{transform:translateY(0) rotate(-10deg);opacity:1;}55%,80%{transform:translateY(0) rotate(30deg);opacity:1;}90%,100%{transform:translateY(-120%) rotate(-12deg);opacity:0;}}

.subtitle{font-size:clamp(12px,2vw,16px);color:var(--c);margin-top:14px;letter-spacing:3px;animation:subtitle-in 0.8s var(--ease) both;animation-delay:2s;}
@keyframes subtitle-in{from{opacity:0;letter-spacing:8px;}to{opacity:1;letter-spacing:3px;}}
.tw-wrapper{margin-top:18px;border:1px solid rgba(0,240,255,0.28);border-radius:6px;padding:10px 18px;display:inline-block;background:rgba(0,240,255,0.03);animation:fade-in 0.6s var(--ease) both;animation-delay:2.2s;}
@keyframes fade-in{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.typewriter{font-size:clamp(13px,2vw,15px);color:var(--g);min-height:1.4em;}
.tw-cursor{display:inline-block;width:2px;height:1em;background:var(--g);margin-left:2px;vertical-align:middle;animation:blink 0.85s step-end infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

.section-title{font-family:'Russo One',sans-serif;font-size:clamp(14px,2.5vw,20px);color:var(--c);letter-spacing:3px;margin:40px 0 20px;text-shadow:0 0 10px rgba(0,240,255,0.45);position:relative;}
.section-title::after{content:'';position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);width:0;height:1px;background:var(--c);animation:line-expand 1s var(--ease) forwards 0.3s;box-shadow:0 0 7px var(--c);}
@keyframes line-expand{to{width:120px;}}

.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.card{background:linear-gradient(135deg,rgba(0,240,255,0.03) 0%,rgba(176,38,255,0.05) 100%);border:1px solid rgba(0,240,255,0.18);border-radius:14px;padding:22px 16px;text-align:center;position:relative;overflow:hidden;transition:transform 0.4s var(--ease),box-shadow 0.4s var(--ease),border-color 0.4s var(--ease);}
.card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,240,255,0.07),rgba(176,38,255,0.07));opacity:0;transition:opacity 0.4s var(--ease);}
.card:hover{transform:translateY(-5px) scale(1.018);border-color:rgba(0,240,255,0.5);box-shadow:0 8px 28px rgba(0,240,255,0.12);}
.card:hover::before{opacity:1;}
.card h3{font-family:'Fira Code',monospace;font-size:12px;color:var(--c);letter-spacing:2px;margin:0 0 14px;text-shadow:0 0 7px var(--c);}

.skill-icons{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;width:100%;align-items:center;}
.skill-icons img{height:48px;width:auto;transition:transform 0.35s var(--spring),filter 0.35s var(--ease),opacity 0.3s var(--ease);filter:drop-shadow(0 0 3px rgba(255,255,255,0.1));opacity:1;}
.skill-icons:hover img{opacity:0.2;filter:drop-shadow(0 0 1px rgba(255,255,255,0.02))!important;}
.skill-icons img:hover{transform:scale(1.28) translateY(-4px);opacity:1!important;}

img[alt="Python"]:hover {filter:drop-shadow(0 0 8px #3776AB) drop-shadow(0 0 16px #FFD343) brightness(1.15)!important;}
img[alt="Lua"]:hover    {filter:drop-shadow(0 0 8px #9999ff) drop-shadow(0 0 16px #5050cc) brightness(1.15)!important;}
img[alt="Go"]:hover     {filter:drop-shadow(0 0 8px #00ACD7) drop-shadow(0 0 16px #7FD5EA) brightness(1.15)!important;}
img[alt="Android"]:hover{filter:drop-shadow(0 0 8px #3ddc84) drop-shadow(0 0 16px #00cc60) brightness(1.15)!important;}
img[alt="Linux"]:hover  {filter:drop-shadow(0 0 8px #f5c518) drop-shadow(0 0 16px #d4a800) brightness(1.15)!important;}
img[alt="Bash"]:hover   {filter:drop-shadow(0 0 8px #4EAA25) drop-shadow(0 0 16px #60c030) brightness(1.15)!important;}
img[alt="Git"]:hover    {filter:drop-shadow(0 0 8px #F05032) drop-shadow(0 0 16px #cc4422) brightness(1.15)!important;}
img[alt="GitHub"]:hover {filter:drop-shadow(0 0 8px #aaaaaa) drop-shadow(0 0 16px #dddddd) brightness(1.15)!important;}
img[alt="VSCode"]:hover {filter:drop-shadow(0 0 8px #007ACC) drop-shadow(0 0 16px #3faaee) brightness(1.15)!important;}
img[alt="PyCharm"]:hover{filter:drop-shadow(0 0 8px #21D789) drop-shadow(0 0 16px #FFB700) brightness(1.15)!important;}

.hud-list{display:flex;flex-direction:column;gap:24px;}

.hud-wrap{
  position:relative;
  border-radius:20px;
  padding:2px;
  isolation:isolate;
  transition:transform 0.4s var(--ease), filter 0.4s var(--ease);
}
.hud-wrap::before{
  content:'';position:absolute;inset:0;border-radius:20px;z-index:0;
  background:conic-gradient(from 0deg,
    var(--c) 0%,
    var(--p) 22%,
    var(--k) 44%,
    var(--y) 66%,
    var(--g) 82%,
    var(--c) 100%
  );
  animation:hud-spin 7s linear infinite;
  opacity:0.7;
  transition:opacity 0.4s var(--ease);
}
.hud-wrap:hover::before{opacity:1;}
@keyframes hud-spin{to{filter:hue-rotate(360deg);}}

.hud-wrap::after{
  content:'';position:absolute;inset:-3px;border-radius:23px;z-index:-1;
  background:conic-gradient(from 0deg,var(--c),var(--p),var(--k),var(--c));
  filter:blur(10px);
  opacity:0;
  transition:opacity 0.5s var(--ease);
  animation:hud-spin 7s linear infinite;
}
.hud-wrap:hover::after{opacity:0.35;}

.hud-inner{
  position:relative;z-index:2;
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 24px;
  background:linear-gradient(135deg,rgba(3,3,10,0.98) 0%,rgba(8,4,20,0.98) 100%);
  border-radius:18px;
  overflow:hidden;
  transition:transform 0.4s var(--ease);
  will-change:transform;
}
.hud-inner::after{
  content:'';position:absolute;top:0;left:-100%;width:55%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(0,240,255,0.6),transparent);
  animation:scan-line 5s linear infinite;
}
@keyframes scan-line{to{left:120%;}}
.hud-wrap:hover .hud-inner{transform:translateX(3px);}

.hud-info{display:flex;flex-direction:column;gap:10px;}

.proj-name{
  font-family:'Russo One',sans-serif;
  font-size:clamp(13px,2vw,16px);
  color:#ffffff;
  letter-spacing:1px;
  text-shadow:0 0 0 transparent;
  transition:text-shadow 0.4s var(--ease),color 0.4s var(--ease),letter-spacing 0.4s var(--ease);
}
.hud-wrap:hover .proj-name{
  color:var(--c);
  text-shadow:0 0 12px rgba(0,240,255,0.5),0 0 28px rgba(0,240,255,0.2);
  letter-spacing:2px;
}

.tags{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.tags>img{height:24px;border-radius:4px;transition:transform 0.3s var(--ease),filter 0.3s var(--ease);opacity:0.9;}
.tags>img:hover{transform:scale(1.08) translateY(-2px);filter:brightness(1.15);}
.sys-status{display:flex;flex-direction:column;align-items:center;gap:8px;flex-shrink:0;}

.badge{
  display:flex;align-items:center;gap:8px;
  padding:7px 15px;border-radius:20px;
  font-size:11px;letter-spacing:2.5px;font-weight:700;
  border:1px solid;
  position:relative;overflow:hidden;
  transition:transform 0.3s var(--spring),box-shadow 0.3s var(--ease);
  backdrop-filter:blur(4px);
}
.badge::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.08) 0%,transparent 60%);
  pointer-events:none;
}
.b-run{
  background:rgba(0,255,65,0.08);
  border-color:rgba(0,255,65,0.45);
  color:var(--g);
  box-shadow:0 0 12px rgba(0,255,65,0.12),inset 0 0 10px rgba(0,255,65,0.05);
  animation:badge-run-idle 3s ease-in-out infinite;
}
@keyframes badge-run-idle{
  0%,100%{box-shadow:0 0 12px rgba(0,255,65,0.12),inset 0 0 10px rgba(0,255,65,0.05);}
  50%{box-shadow:0 0 20px rgba(0,255,65,0.22),inset 0 0 16px rgba(0,255,65,0.1);}
}
.b-stop{
  background:rgba(255,0,127,0.08);
  border-color:rgba(255,0,127,0.4);
  color:var(--k);
  box-shadow:0 0 10px rgba(255,0,127,0.1),inset 0 0 8px rgba(255,0,127,0.04);
}

.badge .dot{
  width:7px;height:7px;border-radius:50%;
  background:currentColor;flex-shrink:0;
}
.b-run .dot{
  animation:dot-ping 1.4s ease-in-out infinite;
  box-shadow:0 0 0 0 rgba(0,255,65,0.7);
}
@keyframes dot-ping{
  0%{transform:scale(1);box-shadow:0 0 0 0 rgba(0,255,65,0.7);}
  60%{transform:scale(1.05);box-shadow:0 0 0 6px rgba(0,255,65,0);}
  100%{transform:scale(1);box-shadow:0 0 0 0 rgba(0,255,65,0);}
}
.b-stop .dot{
  animation:dot-flicker 2.8s ease-in-out infinite;
}
@keyframes dot-flicker{
  0%,100%{opacity:1;}
  40%,60%{opacity:0.15;}
  50%{opacity:0.6;}
}

.badge-txt-run{
  background:linear-gradient(90deg,#00ff41,#7fffb0,#00ff41);
  background-size:200% 100%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:txt-shimmer-run 2.5s linear infinite;
}
@keyframes txt-shimmer-run{0%{background-position:0% 50%;}100%{background-position:200% 50%;}}

.badge-txt-stop{
  animation:txt-glitch 4s ease-in-out infinite;
}
@keyframes txt-glitch{
  0%,92%,100%{opacity:1;transform:none;letter-spacing:2.5px;color:var(--k);}
  93%{transform:skewX(-8deg) translateX(-2px);opacity:0.7;letter-spacing:0px;color:#ff6ab0;}
  95%{transform:skewX(6deg) translateX(1px);opacity:0.9;letter-spacing:4px;}
  97%{transform:skewX(-3deg);opacity:0.5;letter-spacing:1px;}
}

.mining-status-txt{
  font-size:11px;letter-spacing:1.5px;margin-top:4px;
  position:relative;display:inline-block;overflow:hidden;
}
.mining-status-txt span{
  background:linear-gradient(90deg,var(--c) 0%,var(--p) 35%,var(--k) 65%,var(--y) 85%,var(--c) 100%);
  background-size:300% 100%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:mining-flow 3s linear infinite;
  font-weight:700;
}
@keyframes mining-flow{0%{background-position:0% 50%;}100%{background-position:300% 50%;}}
.mining-status-txt .ellipsis::after{
  content:'';
  animation:ellipsis 1.8s step-end infinite;
  background:linear-gradient(90deg,var(--c),var(--y));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
@keyframes ellipsis{0%{content:'';}25%{content:'.';}50%{content:'..';}75%{content:'...';}100%{content:'';}}

.mining-rig{position:relative;width:115px;height:100px;display:flex;justify-content:center;align-items:center;}
.btc-icon{font-size:40px;color:var(--y);filter:drop-shadow(0 0 14px rgba(247,147,26,0.85));animation:btc-float 2s ease-in-out infinite;z-index:2;position:relative;margin-right:14px;}
@keyframes btc-float{0%,100%{transform:translateY(0) scale(1);}25%{transform:translateY(-5px) scale(1.04);filter:drop-shadow(0 0 22px rgba(247,147,26,1));}75%{transform:translateY(3px) scale(0.97);filter:drop-shadow(0 0 8px rgba(247,147,26,0.55));}}
.mc-pickaxe{position:absolute;right:2px;top:2px;width:52px;height:52px;transform-origin:15% 85%;z-index:4;animation:pickaxe-dig 2s cubic-bezier(0.4,0,0.2,1) infinite;}
@keyframes pickaxe-dig{0%{transform:scaleX(-1) rotate(-62deg);}35%{transform:scaleX(-1) rotate(-62deg);}55%{transform:scaleX(-1) rotate(22deg);}63%{transform:scaleX(-1) rotate(16deg);}68%{transform:scaleX(-1) rotate(22deg);}85%{transform:scaleX(-1) rotate(-38deg);}100%{transform:scaleX(-1) rotate(-62deg);}}
.mc-pickaxe img{width:100%;height:100%;display:block;image-rendering:pixelated;animation:enchant-pulse 2s ease-in-out alternate infinite;}
@keyframes enchant-pulse{0%{filter:drop-shadow(0 0 5px var(--p)) drop-shadow(0 0 10px var(--c)) brightness(1.2);}100%{filter:drop-shadow(0 0 14px var(--k)) drop-shadow(0 0 22px var(--c)) brightness(1.7) hue-rotate(12deg);}}
.impact-ring{position:absolute;bottom:18px;right:8px;width:0;height:0;border-radius:50%;border:2px solid var(--y);opacity:0;pointer-events:none;z-index:3;}
.impact-ring.pop{animation:ring-pop 0.4s var(--ease) forwards;}
@keyframes ring-pop{0%{width:0;height:0;opacity:0.9;margin:0;}100%{width:50px;height:50px;opacity:0;margin:-25px -25px;}}
.profit-txt{position:absolute;font-weight:700;color:var(--g);font-size:11px;text-shadow:0 0 8px var(--g);z-index:10;pointer-events:none;white-space:nowrap;animation:float-up 0.9s var(--ease) forwards;}
@keyframes float-up{0%{transform:translateY(0) scale(1);opacity:1;}100%{transform:translateY(-45px) scale(1.1);opacity:0;}}
.spark{position:absolute;background:#fff;border-radius:50%;box-shadow:0 0 6px var(--y),0 0 12px var(--k);z-index:5;pointer-events:none;}

.glt{display:inline-flex;align-items:center;border-radius:8px;overflow:hidden;transition:transform 0.3s var(--spring),box-shadow 0.3s var(--ease),filter 0.3s var(--ease);cursor:pointer;}
.glt:hover{transform:scale(1.12) translateY(-3px);}
.glt img{display:block;object-fit:cover;}
.glt.blox:hover{box-shadow:0 0 14px rgba(255,90,0,0.55);filter:brightness(1.1);}
.glt.volt:hover{box-shadow:0 0 14px rgba(140,80,255,0.55);filter:brightness(1.1);}
.glt.banana:hover{box-shadow:0 0 14px rgba(255,210,0,0.55);filter:brightness(1.1);}

@media(max-width:600px){.grid{grid-template-columns:1fr;}.hud-inner{flex-direction:column;align-items:flex-start;gap:15px;}.sys-status{align-items:flex-start;}}
</style>
</head>
<body>
<div class="cursor-glow" id="cursor"></div>
<div id="particles-js"></div>
<div class="container">

  <header class="header rev" style="animation-delay:0.05s;">

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
'use strict';
const lowEnd = navigator.hardwareConcurrency <= 2;

const cursor = document.getElementById('cursor');
if(window.matchMedia('(hover:hover)').matches){
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top  = e.clientY + 'px';
  });
}

const CC = ['#00f0ff','#ff007f','#b026ff','#f7931a','#00ff41'];
document.addEventListener('click', e => {
  const col = CC[Math.floor(Math.random() * CC.length)];
  [0, 95, 190].forEach(d => {
    setTimeout(() => {
      const r = document.createElement('div');
      r.className = 'cr';
      r.style.cssText = `left:${e.clientX}px;top:${e.clientY}px;border-color:${col};`;
      document.body.appendChild(r);
      setTimeout(() => r.remove(), 800);
    }, d);
  });
  const b = document.createElement('div');
  b.className = 'cs';
  b.style.cssText = `left:${e.clientX}px;top:${e.clientY}px;`;
  const N = 12 + Math.floor(Math.random() * 6);
  for(let i = 0; i < N; i++){
    const s = document.createElement('span');
    const ang = (i / N) * Math.PI * 2 + Math.random() * 0.4;
    const dist = 28 + Math.random() * 48;
    s.style.cssText = `left:0;top:0;width:3px;height:3px;background:${col};box-shadow:0 0 6px ${col};`;
    s.animate([
      {transform:'translate(-50%,-50%)',opacity:1},
      {transform:`translate(calc(-50% + ${Math.cos(ang)*dist}px),calc(-50% + ${Math.sin(ang)*dist}px)) scale(0)`,opacity:0}
    ], {duration:460 + Math.random() * 180, easing:'cubic-bezier(0,0.9,0.57,1)', fill:'forwards'});
    b.appendChild(s);
  }
  document.body.appendChild(b);
  setTimeout(() => b.remove(), 750);
});

particlesJS('particles-js', lowEnd
  ? {particles:{number:{value:18},color:{value:'#00f0ff'},shape:{type:'circle'},opacity:{value:.28},size:{value:1.5},move:{enable:true,speed:0.9}}}
  : {particles:{number:{value:50},color:{value:['#00f0ff','#ff007f','#b026ff']},shape:{type:'circle'},opacity:{value:.4},size:{value:1.8},line_linked:{enable:true,distance:135,color:'#b026ff',opacity:.18},move:{enable:true,speed:1.3}}}
);

setTimeout(() => {const t=document.getElementById('main-title');if(t)t.classList.add('done');}, 1710);

const lines = [
  'Từng sợ hãi khi đối diện Soft-Brick...',
  'Bây giờ Hard-Brick chỉ là trò trẻ con.',
  'System Initialized. Ready for override.'
];
const twEl = document.getElementById('tw-text');
let li=0,ci=0,isE=false;
function ts(){
  const cur = lines[li];
  twEl.innerHTML = cur.slice(0,ci) + '<span class="tw-cursor"></span>';
  if(!isE){
    if(ci < cur.length){ci++;setTimeout(ts,58);}
    else{isE=true;setTimeout(ts,2600);}
  } else {
    if(ci > 0){ci--;setTimeout(ts,22);}
    else{isE=false;li=(li+1)%lines.length;setTimeout(ts,480);}
  }
}
setTimeout(ts, 1500);

const rig = document.getElementById('mining-rig');
const ir  = document.getElementById('impact-ring');
function doHit(){
  ir.classList.remove('pop'); void ir.offsetWidth; ir.classList.add('pop');
  const p = document.createElement('div');
  p.className='profit-txt';
  p.textContent = '+0.00' + (Math.floor(Math.random()*9)+1) + ' BTC';
  p.style.cssText = 'left:8px;top:8px;';
  rig.appendChild(p); setTimeout(()=>p.remove(),900);
  for(let i=0;i<7;i++){
    const s=document.createElement('div'); s.className='spark';
    const sz=2+Math.random()*4;
    s.style.cssText=`left:75px;top:58px;width:${sz}px;height:${sz}px;`;
    rig.appendChild(s);
    const ang=Math.random()*Math.PI*2, vel=12+Math.random()*26;
    s.animate([{transform:'translate(0,0) scale(1)',opacity:1},{transform:`translate(${Math.cos(ang)*vel}px,${Math.sin(ang)*vel-18}px) scale(0.1)`,opacity:0}],{duration:380+Math.random()*230,easing:'ease-out'});
    setTimeout(()=>s.remove(),640);
  }
}
setInterval(()=>setTimeout(doHit,1100),2000);
</script>
